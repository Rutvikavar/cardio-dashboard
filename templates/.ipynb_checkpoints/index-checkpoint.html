<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cardio Disease Prediction</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header text-center bg-primary text-white">
            <h3>Cardiovascular Disease Prediction System</h3>
            <p>Machine Learning Based Healthcare Application</p>
        </div>

        <div class="card-body">
            <form method="POST" action="/predict">

                <div class="row mb-3">
                    <div class="col">
                        <label>Age</label>
                        <input type="number" name="age" class="form-control" required>
                    </div>
                    <div class="col">
                        <label>Gender</label>
                        <select name="gender" class="form-control">
                            <option value="1">Female</option>
                            <option value="2">Male</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label>Height (cm)</label>
                        <input type="number" name="height" class="form-control" required>
                    </div>
                    <div class="col">
                        <label>Weight (kg)</label>
                        <input type="number" name="weight" class="form-control" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label>Systolic BP</label>
                        <input type="number" name="ap_hi" class="form-control" required>
                    </div>
                    <div class="col">
                        <label>Diastolic BP</label>
                        <input type="number" name="ap_lo" class="form-control" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label>Cholesterol</label>
                        <select name="cholesterol" class="form-control">
                            <option value="1">Normal</option>
                            <option value="2">Above Normal</option>
                            <option value="3">Well Above Normal</option>
                        </select>
                    </div>
                    <div class="col">
                        <label>Glucose</label>
                        <select name="gluc" class="form-control">
                            <option value="1">Normal</option>
                            <option value="2">Above Normal</option>
                            <option value="3">Well Above Normal</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label>Smoking</label>
                        <select name="smoke" class="form-control">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="col">
                        <label>Alcohol Intake</label>
                        <select name="alco" class="form-control">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Physical Activity</label>
                    <select name="active" class="form-control">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button class="btn btn-primary btn-lg">Predict</button>
                </div>
            </form>

            {% if prediction_text %}
                <div class="alert 
                    {% if 'Detected' in prediction_text %}alert-danger{% else %}alert-success{% endif %} text-center mt-4">
                        <strong>{{ prediction_text }}</strong>
                </div>
            {% endif %}


        </div>

        <div class="card-footer text-center text-muted">
            © ML Project – Cardiovascular Disease Prediction
        </div>
    </div>
</div>

</body>
</html>
